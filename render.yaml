services:
  # ── Backend API ──────────────────────────────────────────────
  - type: web
    name: ucla-voicedesk-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false          # Set manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: ucla-voicedesk-db
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          name: ucla-voicedesk-frontend
          type: web
          property: host

  # ── Frontend ─────────────────────────────────────────────────
  - type: web
    name: ucla-voicedesk-frontend
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: ucla-voicedesk-api
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: ucla-voicedesk-db
    plan: free
    databaseName: voicedesk
    user: voicedesk_user
    postgresMajorVersion: 15
